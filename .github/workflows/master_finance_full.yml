name: MASTER Finance FULL Semanal (Omie -> Supabase)

# Import COMPLETO de todo o financeiro — roda 1x por semana (domingo).
# Garante que registros antigos (fora dos 90 dias do diário) sejam atualizados.
# Demora ~1-2h mas roda só no domingo.

on:
  workflow_dispatch:
    inputs:
      empresas:
        description: "Empresas (CSV)"
        required: false
        default: "SF,CD,WW"

  # schedule DESATIVADO via painel web - rodar apenas manual
  # schedule:
  #   - cron: "0 6 * * 0"  # Domingo 06:00 UTC (03:00 BRT)

concurrency:
  group: master-finance-full
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 240  # 4h — bases grandes (60k+ títulos)

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "1 Contas a Pagar (FULL)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF,CD,WW' }}
          FORCAR_FULL: "true"
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_contas_pagar.py
        continue-on-error: true

      - name: "Pausa (60s)"
        run: sleep 60

      - name: "2 Contas a Receber (FULL)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF,CD,WW' }}
          FORCAR_FULL: "true"
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_contas_receber.py
        continue-on-error: true

      - name: "Pausa (60s)"
        run: sleep 60

      - name: "3 Pesquisa Titulos (FULL)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF,CD,WW' }}
          FORCAR_FULL: "true"
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_pesquisa_titulos.py
        continue-on-error: true

      - name: "Pausa (60s)"
        run: sleep 60

      - name: "4 Extratos CC (FULL)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF,CD,WW' }}
          FORCAR_FULL: "true"
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_extratos_cc.py
        continue-on-error: true

      - name: Resumo
        if: always()
        run: |
          echo "========================================================"
          echo "Master Finance FULL Semanal concluida"
          echo "========================================================"
