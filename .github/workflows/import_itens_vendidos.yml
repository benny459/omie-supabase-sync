name: Import Itens Vendidos (Omie → Supabase)

on:
  # Apenas manual — chamado pelo master_sales_diaria ou via `gh workflow run`
  workflow_dispatch:
    inputs:
      empresas:
        description: "Empresas (CSV)"
        required: false
        default: "SF"
      forcar_full:
        description: "Forçar FULL"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      data_inicio:
        description: "Data início FULL"
        required: false
        default: "01/01/2025"

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run import script
        env:
          # Supabase
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # Omie credentials (por empresa)
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}

          # Inputs do workflow_dispatch (com defaults para schedule)
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF' }}
          FORCAR_FULL: ${{ github.event.inputs.forcar_full || 'false' }}
          DATA_INICIO_FULL: ${{ github.event.inputs.data_inicio || '01/01/2025' }}

          # Sheets mirror via Apps Script Web App (opcional)
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
          SHEETS_MIRROR_CFG: "ItensVendidos"

          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_itens_vendidos.py
