name: MASTER Orders Semanal (Omie -> Supabase)

# Roda semanalmente:
# 1. Orders Auxiliares (7 tabelas de cadastros: produtos, etapas, formas pag, etc)
# 2. Pedidos Compra FULL (~4200 PCs / ~90s) — pra captar edits em PCs antigos
#    que o DIARIO (que pega so 10 pgs / 1000 PCs recentes) nao detecta.

on:
  workflow_dispatch:
    inputs:
      empresas:
        description: "Empresas (CSV, default: SF)"
        required: false
        default: "SF"

  # Cron fixo: domingo 7 BRT (= 10 UTC, 0=domingo)
  schedule:
    - cron: "0 10 * * 0"

concurrency:
  group: master-orders-semanal
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------
      # 1. Orders Auxiliares (7 tabelas em 1 script)
      # -----------------------------------------
      - name: "1 Orders Auxiliares (7 tabelas)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF' }}
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_orders_auxiliares.py
        continue-on-error: true

      - name: "Pausa entre modulos (30s)"
        run: sleep 30

      # -----------------------------------------
      # 2. Pedidos Compra FULL (todas as paginas)
      # Sem MAX_PAGINAS_PEDCOMPRA = pega tudo (~4200 PCs / ~90s)
      # -----------------------------------------
      - name: "2 Pedidos de Compra (FULL semanal — todos PCs)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF' }}
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_pedidos_compra.py
        continue-on-error: true

      - name: "Mirror Tudo (Sheets Orders)"
        if: always()
        env:
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL_ORDERS }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
        run: |
          if [ -z "$SHEETS_MIRROR_URL" ]; then echo "URL Orders nao configurado - pulando"; exit 0; fi
          curl -sS -L -X POST "$SHEETS_MIRROR_URL" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$SHEETS_MIRROR_TOKEN\",\"cfgName\":\"TUDO\"}" \
            --max-time 360 || echo "Webhook falhou (nao-critico)"

      - name: Resumo
        if: always()
        run: |
          echo "========================================================"
          echo "Master Orders Semanal concluida"
          echo "Empresas: ${{ github.event.inputs.empresas || 'SF' }}"
          echo "========================================================"
