name: MASTER Sales Semanal (Omie -> Supabase)

# Roda semanalmente os importers de cadastros (Produtos + Auxiliares).
# Esses dados mudam raramente, entao uma vez por semana e suficiente.

on:
  workflow_dispatch:
    inputs:
      empresas:
        description: "Empresas (CSV, default: SF,CD,WW)"
        required: false
        default: "SF,CD,WW"

  schedule:
    - cron: "0 8 * * 0"  # Domingo 08:00 UTC (05:00 BRT)

concurrency:
  group: master-sales-semanal
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------
      # 0. Etapas de Pedidos FULL — semanal pega TODAS as páginas pra cobrir
      #    pedidos antigos reabertos/alterados que o diário (últimas 20 pgs)
      #    pode ter perdido. Sem MAX_PAGINAS_ETAPAS = FULL.
      # -----------------------------------------
      - name: "0 Etapas de Pedidos (FULL semanal)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF,CD,WW' }}
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_etapas_pedidos.py
        continue-on-error: true

      - name: "Pausa (60s)"
        run: sleep 60

      # -----------------------------------------
      # 1. Produtos (7k-12k rows)
      # -----------------------------------------
      - name: "1 Produtos"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF,CD,WW' }}
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_produtos.py
        continue-on-error: true

      - name: "Pausa (60s)"
        run: sleep 60

      # -----------------------------------------
      # 2. Auxiliares (FormasPag + Categorias)
      # -----------------------------------------
      - name: "2 Auxiliares"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF,CD,WW' }}
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_auxiliares.py
        continue-on-error: true

      - name: "Mirror Tudo (Sheets Sales)"
        if: always()
        env:
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL_SALES }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
        run: |
          if [ -z "$SHEETS_MIRROR_URL" ]; then echo "URL Sales nao configurado - pulando"; exit 0; fi
          curl -sS -L -X POST "$SHEETS_MIRROR_URL" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$SHEETS_MIRROR_TOKEN\",\"cfgName\":\"TUDO\"}" \
            --max-time 360 || echo "Webhook falhou (nao-critico)"

      - name: Resumo
        if: always()
        run: |
          echo "========================================================"
          echo "Master Sales Semanal concluida"
          echo "Empresas: ${{ github.event.inputs.empresas || 'SF,CD,WW' }}"
          echo "========================================================"
