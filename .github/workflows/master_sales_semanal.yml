name: 🚀 MASTER Sales Semanal (Omie → Supabase)

# Roda semanalmente os importers de cadastros (Produtos + Auxiliares).
# Esses dados mudam raramente, então uma vez por semana é suficiente.

on:
  workflow_dispatch:
    inputs:
      empresas:
        description: "Empresas (CSV, default: SF,CD,WW)"
        required: false
        default: "SF,CD,WW"

  schedule:
    - cron: "0 4 * * 0"  # Domingo 04:00 UTC (01:00 BRT)

concurrency:
  group: master-sales-semanal
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ─────────────────────────────────────
      # 1. Produtos (7k-12k rows)
      # ─────────────────────────────────────
      - name: 1️⃣ Produtos
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF,CD,WW' }}
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_produtos.py
        continue-on-error: true

      - name: ⏸️ Pausa (60s)
        run: sleep 60

      # ─────────────────────────────────────
      # 2. Auxiliares (FormasPag + Categorias)
      # ─────────────────────────────────────
      - name: 2️⃣ Auxiliares
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF,CD,WW' }}
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_auxiliares.py
        continue-on-error: true

      - name: 🏁 Resumo
        if: always()
        run: |
          echo "════════════════════════════════════════════════════"
          echo "🏁 Master Sales Semanal concluída"
          echo "Empresas: ${{ github.event.inputs.empresas || 'SF,CD,WW' }}"
          echo "════════════════════════════════════════════════════"
