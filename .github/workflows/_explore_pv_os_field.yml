name: TEMP Explore PV/OS contract field

on:
  workflow_dispatch:

jobs:
  explore:
    runs-on: ubuntu-latest
    env:
      OMIE_APP_KEY_SF:    ${{ secrets.OMIE_APP_KEY_SF }}
      OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
    steps:
      - name: Call Omie ConsultarPedido (PV 1720) and ConsultarOS (OS 3971)
        run: |
          python3 - <<'PY'
          import json, os, urllib.request

          KEY    = os.environ["OMIE_APP_KEY_SF"]
          SECRET = os.environ["OMIE_APP_SECRET_SF"]

          def call(url: str, action: str, param: dict):
              body = json.dumps({"call": action, "app_key": KEY, "app_secret": SECRET, "param": [param]}).encode()
              req = urllib.request.Request(url, data=body, headers={"Content-Type": "application/json"}, method="POST")
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.loads(r.read().decode())

          def find_contract_fields(obj, path=""):
              hits = []
              if isinstance(obj, dict):
                  for k, v in obj.items():
                      p = f"{path}.{k}" if path else k
                      if isinstance(v, (dict, list)):
                          hits.extend(find_contract_fields(v, p))
                      else:
                          if "contrato" in k.lower() or "proposta" in k.lower() or (isinstance(v, str) and v.startswith("OPS")):
                              hits.append((p, v))
              elif isinstance(obj, list):
                  for i, x in enumerate(obj):
                      hits.extend(find_contract_fields(x, f"{path}[{i}]"))
              return hits

          print("=" * 70)
          print("PV 1720 — ConsultarPedido")
          print("=" * 70)
          try:
              pv = call("https://app.omie.com.br/api/v1/produtos/pedido/", "ConsultarPedido", {"numero_pedido": "1720"})
              hits = find_contract_fields(pv)
              print(f"Campos com 'contrato'/'proposta'/valor 'OPS...':")
              for p, v in hits:
                  print(f"  {p} = {v!r}")
              # Tambem dump o nó informacoes_adicionais inteiro pra contexto
              info_add = pv.get("pedido_venda_produto", {}).get("informacoes_adicionais") or pv.get("informacoes_adicionais")
              print(f"\nNó informacoes_adicionais (PV):")
              print(json.dumps(info_add, indent=2, ensure_ascii=False))
          except Exception as e:
              print(f"ERRO PV: {e}")

          print()
          print("=" * 70)
          print("OS 3971 — ConsultarOS")
          print("=" * 70)
          try:
              os_resp = call("https://app.omie.com.br/api/v1/servicos/os/", "ConsultarOS", {"nCodOS": 0, "cNumOS": "3971"})
              hits = find_contract_fields(os_resp)
              print(f"Campos com 'contrato'/'proposta'/valor 'OPS...':")
              for p, v in hits:
                  print(f"  {p} = {v!r}")
              # Dump cabecalho e info adicional
              cab = os_resp.get("Cabecalho") or os_resp.get("cabecalho") or {}
              info = os_resp.get("InformacoesAdicionais") or os_resp.get("informacoes_adicionais") or {}
              print(f"\nNó Cabecalho/cabecalho (OS):")
              print(json.dumps(cab, indent=2, ensure_ascii=False))
              print(f"\nNó Informações Adicionais (OS):")
              print(json.dumps(info, indent=2, ensure_ascii=False))
          except Exception as e:
              print(f"ERRO OS: {e}")
          PY
