name: MASTER Finance Semanal (Omie -> Supabase)

# Roda semanalmente os importers de cadastros do modulo Finance:
# Clientes + Categorias + Projetos + ContasCorrentes + Empresas +
# Parcelas + LancamentosCC + Auxiliares (7 tabelas)
# Esses dados mudam raramente, entao uma vez por semana e suficiente.

on:
  workflow_dispatch:
    inputs:
      empresas:
        description: "Empresas (CSV, default: SF)"
        required: false
        default: "SF"

  schedule:
    - cron: "0 10 * * 0"  # Domingo 05:00 UTC (02:00 BRT)

concurrency:
  group: master-finance-semanal
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------
      # 1. Finance Cadastros (8 cadastros em 1 script)
      # -----------------------------------------
      - name: "1 Finance Cadastros (Clientes + Categorias + Projetos + CC + Empresas + Parcelas + LancCC + Aux)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF' }}
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_finance_cadastros.py
        continue-on-error: true

      - name: Resumo
        if: always()
        run: |
          echo "========================================================"
          echo "Master Finance Semanal concluida"
          echo "Empresas: ${{ github.event.inputs.empresas || 'SF' }}"
          echo "========================================================"
