name: ГғВ°ГӮВҹГӮВҡГӮВҖ MASTER Sales DiГғВғГӮВЎria (Omie ГғВўГӮВҶГӮВ’ Supabase)

# Executa todos os importers em SEQUГғВғГӮВҠNCIA pra evitar rate limit paralelo na Omie.
# Disparado 1x ao dia (03:15 UTC = 00:15 BRT) + manual.

on:
  workflow_dispatch:
    inputs:
      empresas:
        description: "Empresas (CSV, default: SF)"
        required: false
        default: "SF"
      forcar_full:
        description: "ForГғВғГӮВ§ar FULL em todos os importers incrementais"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

  schedule:
    - cron: "0 8 * * 1-5"   # Slot #1 вҖ” Seg a Sex  8:00 UTC (05:00 BRT)
    - cron: "0 20 * * 1-5"   # Slot #2 вҖ” Seg a Sex 20:00 UTC (17:00 BRT)

concurrency:
  group: master-sales-diaria
  cancel-in-progress: false   # NГғВғГӮВғO cancela run em andamento se disparar outro

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖ
      # 1. Etapas de Pedidos (3000-6000 rows)
      # ГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖ
      - name: 1ГғВҜГӮВёГӮВҸГғВўГӮВғГӮВЈ Etapas de Pedidos
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF' }}
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_etapas_pedidos.py
        continue-on-error: true

      - name: ГғВўГӮВҸГӮВёГғВҜГӮВёГӮВҸ Pausa entre mГғВғГӮВіdulos (30s)
        run: sleep 30

      # ГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖ
      # 2. Itens Vendidos (incremental diГғВғГӮВЎrio)
      # ГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖ
      - name: 2ГғВҜГӮВёГӮВҸГғВўГӮВғГӮВЈ Itens Vendidos
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF' }}
          FORCAR_FULL: ${{ github.event.inputs.forcar_full || 'false' }}
          DATA_INICIO_FULL: "01/01/2025"
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
          SHEETS_MIRROR_CFG: "ItensVendidos"
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_itens_vendidos.py
        continue-on-error: true

      - name: ГғВўГӮВҸГӮВёГғВҜГӮВёГӮВҸ Pausa entre mГғВғГӮВіdulos (30s)
        run: sleep 30

      # ГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖ
      # 3. Pedidos Venda (incremental diГғВғГӮВЎrio)
      # ГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖ
      - name: 3ГғВҜГӮВёГӮВҸГғВўГӮВғГӮВЈ Pedidos Venda
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF' }}
          FORCAR_FULL: ${{ github.event.inputs.forcar_full || 'false' }}
          DATA_INICIO_FULL: "01/01/2025"
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_pedidos_venda.py
        continue-on-error: true

      - name: ГғВўГӮВҸГӮВёГғВҜГӮВёГӮВҸ Pausa entre mГғВғГӮВіdulos (30s)
        run: sleep 30

      # ГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖ
      # 4. ServiГғВғГӮВ§os (OS + Contratos)
      # ГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖГғВўГӮВ”ГӮВҖ
      - name: 4ГғВҜГӮВёГӮВҸГғВўГӮВғГӮВЈ ServiГғВғГӮВ§os (OS + Contratos)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
