        default: "SF"
      forcar_full:
        description: "For脙搂ar FULL em todos os importers incrementais"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

  schedule:
    - cron: "0 8 * * *"  # Todo dia 脙聽s 03:15 UTC (00:15 BRT)

concurrency:
