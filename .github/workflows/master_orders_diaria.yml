name: MASTER Orders Diaria (Omie -> Supabase)

# Executa NFe Entrada -> Recebimento NFe -> Pedidos Compra em sequencia.
# Disparado 1x ao dia (03:45 UTC = 00:45 BRT, apos Sales master terminar) + manual.

on:
  workflow_dispatch:
    inputs:
      empresas:
        description: "Empresas (CSV, default: SF)"
        required: false
        default: "SF"

  schedule:
    - cron: "0 9 * * 1-5"   # Slot #1 — Seg a Sex  9:00 UTC (06:00 BRT)
    - cron: "0 21 * * 1-5"   # Slot #2 — Seg a Sex 21:00 UTC (18:00 BRT)

concurrency:
  group: master-orders-diaria
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------
      # 1. NFe Entrada (ListarDocumentos)
      # -----------------------------------------
      - name: "1 NFe Entrada"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF' }}
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_nfe_entrada.py
        continue-on-error: true

      - name: "Pausa entre modulos (30s)"
        run: sleep 30

      # -----------------------------------------
      # 2. Recebimento NFe (ListarRecebimentos)
      # -----------------------------------------
      - name: "2 Recebimento NFe"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF' }}
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_recebimento_nfe.py
        continue-on-error: true

      - name: "Pausa entre modulos (30s)"
        run: sleep 30

      # -----------------------------------------
      # 3. Pedidos Compra (PesquisarPedCompra)
      # -----------------------------------------
      - name: "3 Pedidos de Compra"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF' }}
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_pedidos_compra.py
        continue-on-error: true

      - name: "Mirror Tudo (Sheets Orders)"
        if: always()
        env:
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL_ORDERS }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
        run: |
          if [ -z "$SHEETS_MIRROR_URL" ]; then echo "URL Orders nao configurado - pulando"; exit 0; fi
          curl -sS -L -X POST "$SHEETS_MIRROR_URL" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$SHEETS_MIRROR_TOKEN\",\"cfgName\":\"TUDO\"}" \
            --max-time 360 || echo "Webhook falhou (nao-critico)"

      - name: Resumo
        if: always()
        run: |
          echo "========================================================"
          echo "Master Orders Diaria concluida"
          echo "Empresas: ${{ github.event.inputs.empresas || 'SF' }}"
          echo "========================================================"
