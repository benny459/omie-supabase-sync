name: TEMP Explore ListarExtrato com paginacao

on:
  workflow_dispatch:

jobs:
  explore:
    runs-on: ubuntu-latest
    env:
      OMIE_APP_KEY_SF:    ${{ secrets.OMIE_APP_KEY_SF }}
      OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
    steps:
      - name: Test pagination
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          KEY = os.environ["OMIE_APP_KEY_SF"]; SECRET = os.environ["OMIE_APP_SECRET_SF"]
          NCC = 2252238644

          def call(p):
              body = json.dumps({"call":"ListarExtrato","app_key":KEY,"app_secret":SECRET,"param":[p]}).encode()
              req = urllib.request.Request("https://app.omie.com.br/api/v1/financas/extrato/",
                  data=body, headers={"Content-Type":"application/json"}, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=60) as r:
                      return json.loads(r.read().decode()), None
              except urllib.error.HTTPError as e:
                  txt = e.read().decode()[:400]
                  return None, f"HTTP {e.code}: {txt}"

          base = {"nCodCC":NCC,"dPeriodoInicial":"01/05/2026","dPeriodoFinal":"11/05/2026","cExibirApenasSaldo":"N"}

          print("=== Paginacao nPagina=1..N com nRegPorPagina=50 ===")
          tot = 0; all_movs = []
          for pg in range(1, 20):
              r, err = call({**base, "nPagina": pg, "nRegPorPagina": 50})
              if err: print(f"  pag {pg}: {err}"); break
              movs = r.get("listaMovimentos") or []
              if not movs: print(f"  pag {pg}: vazia, fim."); break
              tot += len(movs); all_movs.extend(movs)
              ult = movs[-1].get("dDataLancamento"); pri = movs[0].get("dDataLancamento")
              pag_keys = [k for k in r if "pagin" in k.lower() or "total" in k.lower() or "nReg" in k]
              print(f"  pag {pg}: {len(movs)} movs (acum {tot}) | {pri}->{ult} | meta={ {k: r[k] for k in pag_keys} }")
              if len(movs) < 50: break

          print()
          print("=== Lancamentos 08-11/05 (TODAS paginas agregadas) ===")
          enc = [m for m in all_movs if (m.get("dDataLancamento") or "") in ("08/05/2026","09/05/2026","10/05/2026","11/05/2026")]
          print(f"Total: {len(enc)}")
          for m in enc:
              print(f"  {m.get('dDataLancamento')} | sit={m.get('cSituacao')!r} | tipo={m.get('cTipoDocumento')!r} | lanc={m.get('nCodLancamento')} | R${m.get('nValorDocumento')} | {(m.get('cDesCliente') or '')[:40]!r} | cat={m.get('cDesCategoria')!r}")
          PY
