name: TEMP Explore ListarExtrato com paginacao

on:
  workflow_dispatch:

jobs:
  explore:
    runs-on: ubuntu-latest
    env:
      OMIE_APP_KEY_SF:    ${{ secrets.OMIE_APP_KEY_SF }}
      OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
    steps:
      - name: Test windows
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          KEY = os.environ["OMIE_APP_KEY_SF"]; SECRET = os.environ["OMIE_APP_SECRET_SF"]
          NCC = 2252238644

          def call(p):
              body = json.dumps({"call":"ListarExtrato","app_key":KEY,"app_secret":SECRET,"param":[p]}).encode()
              req = urllib.request.Request("https://app.omie.com.br/api/v1/financas/extrato/",
                  data=body, headers={"Content-Type":"application/json"}, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=60) as r:
                      return json.loads(r.read().decode()), None
              except urllib.error.HTTPError as e:
                  return None, f"HTTP {e.code}: {e.read().decode()[:200]}"

          # Janela curta 06-12/05 (7 dias) — deve caber em <50
          for janela in [("06/05/2026","12/05/2026"), ("01/05/2026","07/05/2026")]:
              r, err = call({"nCodCC":NCC,"dPeriodoInicial":janela[0],"dPeriodoFinal":janela[1],"cExibirApenasSaldo":"N"})
              if err: print(f"{janela}: {err}"); continue
              movs = r.get("listaMovimentos") or []
              print(f"\n=== Janela {janela[0]} -> {janela[1]}: {len(movs)} movs ===")
              for m in movs:
                  d = m.get("dDataLancamento") or ""
                  if d in ("08/05/2026","09/05/2026","10/05/2026","11/05/2026","12/05/2026"):
                      print(f"  {d} | sit={m.get('cSituacao')!r} | tipo={m.get('cTipoDocumento')!r} | lanc={m.get('nCodLancamento')} | R${m.get('nValorDocumento')} | {(m.get('cDesCliente') or '')[:50]} | cat={m.get('cDesCategoria')}")

          # Testa tambem se `cExibirApenasSaldo=N` realmente lista tudo
          # e se omitir traz menos. Saldo-diario que aparece como "SALDO"
          # entrada conta nas 50?
          print()
          print("=== Saldos linha-a-linha contam? Janela 04-07 (4 dias) ===")
          r, _ = call({"nCodCC":NCC,"dPeriodoInicial":"04/05/2026","dPeriodoFinal":"07/05/2026","cExibirApenasSaldo":"N"})
          movs = r.get("listaMovimentos") or []
          saldos = sum(1 for m in movs if (m.get("cDesCliente") or "").startswith("SALDO"))
          print(f"  Total: {len(movs)} | Saldos linha: {saldos} | Reais: {len(movs)-saldos}")
          PY
