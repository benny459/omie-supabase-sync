name: MASTER Finance Diaria (Omie -> Supabase)

# Executa ContasPagar -> ContasReceber -> PesquisaTitulos -> ExtratosCC em sequencia.
# Disparado 2x ao dia (slots configuraveis via painel web) + manual.

on:
  workflow_dispatch:
    inputs:
      empresas:
        description: "Empresas (CSV, default: SF,CD,WW)"
        required: false
        default: "SF,CD,WW"
      forcar_full:
        description: "Forcar FULL (ignora filtro 90 dias)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      dias_incremental:
        description: "Dias do filtro incremental (default: 90)"
        required: false
        default: "90"

  schedule:
    - cron: "0 10 * * 1-5"   # Slot #1 - Seg a Sex 10:00 UTC (07:00 BRT)
    - cron: "0 18 * * 1-5"   # Slot #2 - Seg a Sex 18:00 UTC (15:00 BRT)

concurrency:
  group: master-finance-diaria
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3h - Contas Pagar (54k) + Receber + Titulos (60k) + Extratos

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------
      # 1. Contas a Pagar (ListarContasPagar)
      # -----------------------------------------
      - name: "1 Contas a Pagar"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF,CD,WW' }}
          FORCAR_FULL: ${{ github.event.inputs.forcar_full || 'false' }}
          DIAS_INCREMENTAL: ${{ github.event.inputs.dias_incremental || '90' }}
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_contas_pagar.py
        continue-on-error: true

      - name: "Pausa entre modulos (30s)"
        run: sleep 30

      # -----------------------------------------
      # 2. Contas a Receber (ListarContasReceber)
      # -----------------------------------------
      - name: "2 Contas a Receber"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF,CD,WW' }}
          FORCAR_FULL: ${{ github.event.inputs.forcar_full || 'false' }}
          DIAS_INCREMENTAL: ${{ github.event.inputs.dias_incremental || '90' }}
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_contas_receber.py
        continue-on-error: true

      - name: "Pausa entre modulos (30s)"
        run: sleep 30

      # -----------------------------------------
      # 3. Pesquisa Titulos (PesquisarLancamentos)
      # -----------------------------------------
      - name: "3 Pesquisa Titulos"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF,CD,WW' }}
          FORCAR_FULL: ${{ github.event.inputs.forcar_full || 'false' }}
          DIAS_INCREMENTAL: ${{ github.event.inputs.dias_incremental || '90' }}
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_pesquisa_titulos.py
        continue-on-error: true

      - name: "Pausa entre modulos (30s)"
        run: sleep 30

      # -----------------------------------------
      # 4. Extratos CC (ListarExtrato per account)
      # -----------------------------------------
      - name: "4 Extratos CC"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMIE_APP_KEY_SF: ${{ secrets.OMIE_APP_KEY_SF }}
          OMIE_APP_SECRET_SF: ${{ secrets.OMIE_APP_SECRET_SF }}
          OMIE_APP_KEY_CD: ${{ secrets.OMIE_APP_KEY_CD }}
          OMIE_APP_SECRET_CD: ${{ secrets.OMIE_APP_SECRET_CD }}
          OMIE_APP_KEY_WW: ${{ secrets.OMIE_APP_KEY_WW }}
          OMIE_APP_SECRET_WW: ${{ secrets.OMIE_APP_SECRET_WW }}
          EMPRESAS_ALVO: ${{ github.event.inputs.empresas || 'SF,CD,WW' }}
          FORCAR_FULL: ${{ github.event.inputs.forcar_full || 'false' }}
          DIAS_INCREMENTAL: ${{ github.event.inputs.dias_incremental || '90' }}
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/import_extratos_cc.py
        continue-on-error: true

      - name: "Mirror Tudo (Sheets Finance)"
        if: always()
        env:
          SHEETS_MIRROR_URL: ${{ secrets.SHEETS_MIRROR_URL_FINANCE }}
          SHEETS_MIRROR_TOKEN: ${{ secrets.SHEETS_MIRROR_TOKEN }}
        run: |
          if [ -z "$SHEETS_MIRROR_URL" ]; then echo "URL Finance nao configurado - pulando"; exit 0; fi
          curl -sS -L -X POST "$SHEETS_MIRROR_URL" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$SHEETS_MIRROR_TOKEN\",\"cfgName\":\"TUDO\"}" \
            --max-time 360 || echo "Webhook falhou (nao-critico)"

      - name: Resumo
        if: always()
        run: |
          echo "========================================================"
          echo "Master Finance Diaria concluida"
          echo "Empresas: ${{ github.event.inputs.empresas || 'SF,CD,WW' }}"
          echo "========================================================"
